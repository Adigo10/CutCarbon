# Alembic configuration. The database URL is injected in alembic/env.py from
# app.config.settings (MIGRATION_DATABASE_URL or DATABASE_URL), so no secret lives here.
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Placeholder only; overridden in env.py.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
